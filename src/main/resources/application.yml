server:
  port: 48080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8

spring:
  application:
    name: top-link-mall

  # 1. 数据库配置 (优化为文件模式，防止重启丢数据)
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    # 使用 file 模式替代 mem，数据保存在项目根目录的 data 文件夹下
    url: jdbc:p6spy:h2:file:./data/link_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # 2. H2 Console 配置
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

  sql:
    init:
      mode: always
      schema-locations: classpath*:schema.sql
      # 建议增加 data-locations 用于初始化字典表数据
      # data-locations: classpath*:data.sql

  # 3. Redis 配置 (增强连接池)
  data:
    redis:
      host: 192.168.0.245
      port: 6379
      database: 11
      timeout: 5000ms
      password: redis_FtTapD
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  servlet:
    multipart:
      enabled: true
      max-file-size: 16MB
      max-request-size: 32MB

  # 4. Jackson 全局配置 (符合 Google API 规范)
  jackson:
    serialization:
      # 开启日期转时间戳
      write-dates-as-timestamps: true
      # 强制关闭纳秒，确保返回的是前端易处理的 13 位毫秒时间戳
      write-date-timestamps-as-nanoseconds: false
      write-durations-as-timestamps: false
      fail-on-empty-beans: false
    # 命名策略：驼峰转下划线 (totalCount -> total_count)
    property-naming-strategy: SNAKE_CASE
    # 过滤 null 字段，精简响应体
    default-property-inclusion: non_null
    time-zone: GMT+8
    locale: zh_CN
    deserialization:
      # 忽略前端传入但后端不存在的属性，增强兼容性
      fail-on-unknown-properties: false

# 5. MyBatis Plus 增强配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: me.link.**.domain
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 安全优化：只有非空字段才参与更新，防止覆盖数据
      update-strategy: not_null
      insert-strategy: not_null
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    # 开发环境下可以开启 SQL 打印
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 6. Sa-Token 安全配置
sa-token:
  token-name: tikToken
  timeout: 3600 # 1小时
  active-timeout: 1800 # 30分钟无操作剔除
  is-concurrent: false # 不允许账号并发登录
  is-share: false # 不共用 token
  token-style: tik
  is-log: true
  auto-renew: true # 自动续签，提升用户体验
  jwt-secret-key: link-platform-secret-key-2026
  is-read-header: true
  is-read-cookie: true
  is-color-log: true

# 7. 监控配置 (对接 Spring Boot Admin / Actuator)
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  endpoint:
    health:
      show-details: always